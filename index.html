<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:widget="http://www.netvibes.com/ns/">

<head>
    <title>3DEXPERIENCE to Vertex Viewer</title>
    <meta name="author" content="DSIS" />
    <meta name="apiVersion" content="1.3" />

    <link rel="stylesheet" type="text/css" href="styles/Main.css" />

    <!-- Vertex Viewer -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@vertexvis/viewer@0.23.x/dist/viewer/viewer.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@vertexvis/viewer@0.23.x/dist/viewer.js"></script>

    <script type="text/javascript" src="scripts/Main.js"></script>

    <script type="text/javascript">
        function widgetLoading() {
            if (widget) {
                executeWidgetCode();
            } else {
                setTimeout(widgetLoading, 100);
            }
        }
        widgetLoading();
    </script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        #widget-container {
            height: 100%;
        }

        #content-display {
            height: 100%;
        }

        .viewer-container {
            width: 100%;
            height: 500px;
        }
    </style>
</head>

<body>
    <div id="widget-container">

        <!-- Viewer loads immediately here -->
        <div id="content-display" style="height:100%;"></div>

    </div>
</body>
</html>
